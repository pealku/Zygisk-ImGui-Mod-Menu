name: Build Zygisk Module

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup NDK r22b
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r22b
          local-cache: true

      - name: Ensure SDK packages
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          SDKMANAGER=$(find $ANDROID_SDK_ROOT -name sdkmanager -type f | head -1)
          yes | $SDKMANAGER --licenses || true
          $SDKMANAGER "platforms;android-30" "build-tools;30.0.3" 2>&1 | tail -5

      - name: Configure build
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          echo "ndk.dir=${{ steps.ndk.outputs.ndk-path }}" >> local.properties

      - name: Build release
        run: |
          chmod +x gradlew
          ./gradlew :module:assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thespikerm-zygisk
          path: out/*.zip
