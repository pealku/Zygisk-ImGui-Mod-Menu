name: Build Zygisk Module

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup NDK r22b
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r22b
          local-cache: true

      - name: Install SDK packages
        run: |
          export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
          if [ ! -d "$ANDROID_SDK_ROOT" ]; then
            export ANDROID_SDK_ROOT=$HOME/android-sdk
            mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
            cd $ANDROID_SDK_ROOT/cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q commandlinetools-linux-11076708_latest.zip
            mv cmdline-tools latest 2>/dev/null || true
          fi
          
          SDKMANAGER=$(find $ANDROID_SDK_ROOT -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found"
            find $ANDROID_SDK_ROOT -type d | head -20
            exit 1
          fi
          
          echo "sdkmanager: $SDKMANAGER"
          yes | $SDKMANAGER --licenses || true
          $SDKMANAGER --install "platforms;android-30" "build-tools;30.0.3"

      - name: Configure & Build
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          chmod +x gradlew
          ./gradlew :module:assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thespikerm-zygisk
          path: out/*.zip
